---
layout: default
---
<main id="main" class="docs-shell">
  <div class="wrap docs-grid">
    <aside class="docs-sidebar">
      <details class="docs-nav-disclosure">
        <summary class="docs-nav-toggle">Docs menu</summary>
        {% include docs-nav.html %}
      </details>
    </aside>

    <div class="docs-content">
      {% include breadcrumb.html %}

      <article class="docs-article">
        <h1>{{ page.title }}</h1>
        {{ content }}
      </article>

      {% include prev-next.html %}

      <p class="docs-edit">
        <a href="https://github.com/{{ site.repository }}/blob/main/site/{{ page.path }}">Edit this page on GitHub ↗</a>
      </p>
    </div>
  </div>
</main>
